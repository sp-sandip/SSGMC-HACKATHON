<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Webion Admin — AR Store Dashboard</title>
  <!-- Tailwind CSS via CDN (dev only). For production: npx tailwindcss -i ./src/index.css -o ./public/admin.css --content ./admin.html --minify -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { syne: ['Syne','sans-serif'], dm: ['DM Sans','sans-serif'] },
          colors: {
            gold: { 400:'#f0d080', 500:'#c9a84c', 600:'#a8872e' },
            slate: { 850:'#0f1117', 900:'#09090f', 950:'#05050a' }
          },
          animation: {
            'shake': 'shake 0.5s cubic-bezier(.36,.07,.19,.97)',
            'slide-in': 'slideIn 0.3s ease',
            'fade-up': 'fadeUp 0.4s ease',
            'pulse-gold': 'pulseGold 2s infinite',
            'spin-slow': 'spin 3s linear infinite',
          },
          keyframes: {
            shake: { '0%,100%':{transform:'translateX(0)'},'15%':{transform:'translateX(-8px)'},'30%':{transform:'translateX(8px)'},'45%':{transform:'translateX(-6px)'},'60%':{transform:'translateX(6px)'},'75%':{transform:'translateX(-4px)'},'90%':{transform:'translateX(4px)'} },
            slideIn: { from:{transform:'translateX(100%)',opacity:0}, to:{transform:'translateX(0)',opacity:1} },
            fadeUp: { from:{opacity:0,transform:'translateY(16px)'}, to:{opacity:1,transform:'translateY(0)'} },
            pulseGold: { '0%,100%':{boxShadow:'0 0 0 0 rgba(201,168,76,0.4)'}, '50%':{boxShadow:'0 0 0 8px rgba(201,168,76,0)'} },
          }
        }
      }
    };
  </script>
  <style>
    body { background:#05050a; font-family:'DM Sans',sans-serif; }
    ::-webkit-scrollbar { width:5px; height:5px; }
    ::-webkit-scrollbar-track { background:#0f1117; }
    ::-webkit-scrollbar-thumb { background:#2a2a3a; border-radius:4px; }
    .glass { background:rgba(15,17,23,0.8); backdrop-filter:blur(20px); }
    .gold-border { border:1px solid rgba(201,168,76,0.25); }
    .row-hover:hover { background:rgba(201,168,76,0.04); }
    .sidebar-item { transition:all 0.2s; border-left:2px solid transparent; }
    .sidebar-item:hover,.sidebar-item.active { background:rgba(201,168,76,0.08); border-left-color:#c9a84c; color:#c9a84c; }
    .stat-card { background:linear-gradient(135deg,#0f1117 0%,#131620 100%); }
    .modal-overlay { animation:fadeIn 0.2s ease; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    input[type="text"],input[type="password"],input[type="number"],select,textarea {
      background:#0d0d16; color:#e5e7eb; border:1px solid rgba(255,255,255,0.08);
    }
    input:focus,select:focus,textarea:focus { outline:none; border-color:rgba(201,168,76,0.5); box-shadow:0 0 0 3px rgba(201,168,76,0.1); }
    .stock-danger { background:rgba(239,68,68,0.08) !important; border-left:3px solid #ef4444 !important; }
    .badge-hot { background:#7f1d1d; color:#fca5a5; }
    .badge-new { background:#14532d; color:#86efac; }
    .badge-sale { background:#1e3a5f; color:#93c5fd; }
    .badge-premium { background:#3b1f00; color:#fcd34d; }
    .notif-dot { animation:pulseGold 2s infinite; }
    .chart-bar { transition: height 0.8s cubic-bezier(0.34,1.56,0.64,1); }
    .tooltip { display:none; position:absolute; background:#1a1a2e; border:1px solid rgba(201,168,76,0.3); padding:6px 10px; border-radius:6px; font-size:11px; white-space:nowrap; z-index:100; pointer-events:none; }
    .chart-bar:hover .tooltip { display:block; }
    .review-card { transition:all 0.2s; }
    .review-card:hover { transform:translateY(-2px); }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const API = 'http://localhost:5000/api';

// ── Helpers ─────────────────────────────────────────────────────────────────
const fmt = n => '₹' + Number(n).toLocaleString('en-IN');
const timeSince = d => {
  const s = Math.floor((Date.now() - new Date(d)) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return `${Math.floor(s/60)}m ago`;
  if (s < 86400) return `${Math.floor(s/3600)}h ago`;
  return `${Math.floor(s/86400)}d ago`;
};
const Stars = ({ n }) => '★'.repeat(Math.round(n)) + '☆'.repeat(5-Math.round(n));

// Category color map
const catColor = cat => {
  if (!cat) return 'text-gray-400';
  if (cat.includes('Formal')) return 'text-blue-400';
  if (cat.includes('Casual')) return 'text-green-400';
  if (cat.includes('Ethnic')) return 'text-yellow-400';
  if (cat.includes('Party')) return 'text-pink-400';
  return 'text-purple-400';
};

// ── Toast ──────────────────────────────────────────────────────────────────
function Toast({ toasts }) {
  return (
    <div className="fixed top-4 right-4 z-[200] flex flex-col gap-2 pointer-events-none">
      {toasts.map(t => (
        <div key={t.id} className={`flex items-center gap-3 px-4 py-3 rounded-xl shadow-2xl text-sm font-medium animate-fade-up pointer-events-auto
          ${t.type==='success'?'bg-green-900/90 text-green-300 border border-green-700/50':
            t.type==='error'?'bg-red-900/90 text-red-300 border border-red-700/50':
            'bg-slate-800/90 text-gray-300 border border-white/10'}`}>
          <span>{t.type==='success'?'✓':t.type==='error'?'✗':'ℹ'}</span>
          {t.msg}
        </div>
      ))}
    </div>
  );
}

// ── Stat Card ─────────────────────────────────────────────────────────────
function StatCard({ icon, label, value, sub, color, trend }) {
  return (
    <div className={`stat-card rounded-2xl p-5 gold-border relative overflow-hidden animate-fade-up`}>
      <div className={`absolute top-0 right-0 w-24 h-24 rounded-full opacity-10 blur-2xl ${color}`} />
      <div className="flex items-start justify-between">
        <div>
          <p className="text-xs text-gray-500 font-dm tracking-widest uppercase">{label}</p>
          <p className="text-3xl font-syne font-bold text-white mt-1">{value}</p>
          {sub && <p className="text-xs text-gray-500 mt-1">{sub}</p>}
        </div>
        <div className={`text-2xl p-2 rounded-xl bg-white/5`}>{icon}</div>
      </div>
      {trend !== undefined && (
        <div className={`flex items-center gap-1 mt-3 text-xs font-medium ${trend >= 0 ? 'text-green-400' : 'text-red-400'}`}>
          <span>{trend >= 0 ? '↑' : '↓'}</span>
          <span>{Math.abs(trend)}% vs yesterday</span>
        </div>
      )}
    </div>
  );
}

// ── Mini Bar Chart ───────────────────────────────────────────────────────
function MiniChart({ data, label }) {
  const max = Math.max(...data.map(d=>d.v), 1);
  return (
    <div className="stat-card rounded-2xl p-5 gold-border animate-fade-up">
      <p className="text-xs text-gray-500 tracking-widest uppercase mb-4 font-dm">{label}</p>
      <div className="flex items-end gap-1.5 h-20">
        {data.map((d,i) => (
          <div key={i} className="flex-1 relative group">
            <div className="tooltip bottom-full mb-1 left-1/2 -translate-x-1/2">{d.l}: {d.v}</div>
            <div className="chart-bar w-full rounded-t bg-gold-500/60 group-hover:bg-gold-500 transition-colors"
              style={{height: `${(d.v/max)*100}%`, minHeight:4}}/>
          </div>
        ))}
      </div>
      <div className="flex justify-between mt-2">
        {data.map((d,i) => (
          <span key={i} className="text-[9px] text-gray-600 text-center">{d.l}</span>
        ))}
      </div>
    </div>
  );
}

// ── Login Page ────────────────────────────────────────────────────────────
function LoginPage({ onLogin }) {
  const [id, setId] = useState('');
  const [pw, setPw] = useState('');
  const [err, setErr] = useState('');
  const [shake, setShake] = useState(false);
  const [loading, setLoading] = useState(false);
  const [showPw, setShowPw] = useState(false);

  const tryLogin = async () => {
    if (!id.trim() || !pw.trim()) { setErr('All fields required'); trigShake(); return; }
    setLoading(true); setErr('');
    try {
      const r = await fetch(`${API}/admin/login`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ adminId: id, password: pw })
      });
      const data = await r.json();
      if (!r.ok) { setErr('Access Denied — Invalid credentials'); trigShake(); }
      else { localStorage.setItem('adminToken', data.token); localStorage.setItem('adminName', data.name); onLogin(data); }
    } catch {
      // Demo mode fallback
      if (id === 'admin001' && pw === 'Admin@123') {
        onLogin({ token:'demo', name:'Webion Admin' });
      } else { setErr('Access Denied — Invalid credentials'); trigShake(); }
    }
    setLoading(false);
  };

  const trigShake = () => { setShake(true); setTimeout(()=>setShake(false),600); };

  return (
    <div className="min-h-screen flex items-center justify-center bg-slate-950 relative overflow-hidden">
      {/* Ambient glows */}
      <div className="absolute top-1/4 left-1/3 w-96 h-96 bg-gold-500/8 rounded-full blur-3xl pointer-events-none"/>
      <div className="absolute bottom-1/4 right-1/3 w-64 h-64 bg-purple-900/20 rounded-full blur-3xl pointer-events-none"/>
      {/* Grid texture */}
      <div className="absolute inset-0 opacity-5" style={{backgroundImage:'linear-gradient(rgba(201,168,76,0.5) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,0.5) 1px,transparent 1px)',backgroundSize:'60px 60px'}}/>

      <div className="w-full max-w-md mx-4 animate-fade-up">
        {/* Header */}
        <div className="text-center mb-8">
          <div className="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gold-500/15 border border-gold-500/30 mb-4 animate-pulse-gold">
            <span className="text-2xl">👑</span>
          </div>
          <h1 className="text-3xl font-syne font-bold text-white">Webion Admin</h1>
          <p className="text-gray-500 text-sm mt-1 font-dm">AR Fashion Store — Control Panel</p>
        </div>

        {/* Card */}
        <div className="glass rounded-3xl p-8 gold-border shadow-2xl">
          {err && (
            <div className="flex items-center gap-3 bg-red-900/30 border border-red-500/30 text-red-400 rounded-xl px-4 py-3 mb-6 text-sm animate-fade-up">
              <span className="text-lg">🚫</span>
              <span className="font-medium">{err}</span>
            </div>
          )}

          <div className={shake ? 'animate-shake' : ''}>
            <div className="mb-5">
              <label className="block text-xs text-gray-500 uppercase tracking-widest mb-2 font-dm">Admin ID</label>
              <div className="relative">
                <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-600">🔑</span>
                <input type="text" value={id} onChange={e=>setId(e.target.value)}
                  onKeyDown={e=>e.key==='Enter'&&tryLogin()}
                  placeholder="Enter your Admin ID"
                  className="w-full rounded-xl pl-10 pr-4 py-3 text-sm font-dm focus:ring-0"/>
              </div>
            </div>

            <div className="mb-7">
              <label className="block text-xs text-gray-500 uppercase tracking-widest mb-2 font-dm">Password</label>
              <div className="relative">
                <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-600">🔒</span>
                <input type={showPw?'text':'password'} value={pw} onChange={e=>setPw(e.target.value)}
                  onKeyDown={e=>e.key==='Enter'&&tryLogin()}
                  placeholder="Enter your password"
                  className="w-full rounded-xl pl-10 pr-12 py-3 text-sm font-dm focus:ring-0"/>
                <button onClick={()=>setShowPw(v=>!v)} className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-600 hover:text-gray-400 text-sm">
                  {showPw?'🙈':'👁'}
                </button>
              </div>
            </div>
          </div>

          <button onClick={tryLogin} disabled={loading}
            className="w-full py-3.5 rounded-xl font-syne font-bold text-sm tracking-wide transition-all duration-200 bg-gradient-to-r from-gold-500 to-gold-400 text-slate-900 hover:shadow-lg hover:shadow-gold-500/30 hover:scale-[1.02] active:scale-[0.98] disabled:opacity-50">
            {loading ? <span className="inline-block w-4 h-4 border-2 border-slate-900/50 border-t-slate-900 rounded-full animate-spin"/> : '→ Access Dashboard'}
          </button>

          <p className="text-center text-xs text-gray-600 mt-5 font-dm">
            Demo: ID <span className="text-gold-500/70">admin001</span> · Pass <span className="text-gold-500/70">Admin@123</span>
          </p>
        </div>
      </div>
    </div>
  );
}

// ── Notification Bell ─────────────────────────────────────────────────────
function NotifBell({ reviews, onRead, onDelete, token }) {
  const [open, setOpen] = useState(false);
  const unread = reviews.filter(r=>!r.read).length;
  const ref = useRef(null);
  useEffect(() => {
    const h = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, []);

  const ratingColor = n => n >= 4 ? 'text-green-400' : n === 3 ? 'text-yellow-400' : 'text-red-400';

  return (
    <div className="relative" ref={ref}>
      <button onClick={()=>setOpen(v=>!v)}
        className="relative w-10 h-10 flex items-center justify-center rounded-xl bg-white/5 hover:bg-white/10 transition-colors border border-white/8 text-gray-400 hover:text-white">
        🔔
        {unread > 0 && (
          <span className="absolute -top-1 -right-1 w-5 h-5 bg-red-500 rounded-full text-[10px] font-bold text-white flex items-center justify-center notif-dot">
            {unread > 9 ? '9+' : unread}
          </span>
        )}
      </button>

      {open && (
        <div className="absolute right-0 top-12 w-80 glass rounded-2xl gold-border shadow-2xl z-50 animate-slide-in overflow-hidden">
          <div className="flex items-center justify-between px-4 py-3 border-b border-white/5">
            <span className="font-syne font-bold text-sm text-white">Notifications</span>
            <div className="flex gap-2">
              <span className="text-xs text-gray-500">{unread} unread</span>
              {unread > 0 && (
                <button onClick={()=>reviews.filter(r=>!r.read).forEach(r=>onRead(r._id||r.id))}
                  className="text-xs text-gold-500 hover:text-gold-400">Mark all</button>
              )}
            </div>
          </div>

          <div className="max-h-80 overflow-y-auto">
            {reviews.length === 0 ? (
              <div className="py-8 text-center text-gray-600 text-sm">No notifications</div>
            ) : reviews.map(r => (
              <div key={r._id||r.id}
                className={`px-4 py-3 border-b border-white/4 review-card ${!r.read?'bg-gold-500/5':''} hover:bg-white/5 cursor-pointer`}
                onClick={()=>!r.read&&onRead(r._id||r.id)}>
                <div className="flex items-start justify-between gap-2">
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2">
                      <div className="w-7 h-7 rounded-full bg-gradient-to-br from-gold-500/40 to-purple-500/40 flex items-center justify-center text-xs font-bold text-white flex-shrink-0">
                        {r.userName?.[0]?.toUpperCase()||'?'}
                      </div>
                      <div>
                        <span className="text-xs font-semibold text-white">{r.userName}</span>
                        {!r.read && <span className="ml-2 w-1.5 h-1.5 bg-gold-500 rounded-full inline-block"/>}
                      </div>
                    </div>
                    <p className="text-xs text-gray-400 mt-1 truncate">📦 {r.productName}</p>
                    <p className={`text-xs font-bold ${ratingColor(r.rating)}`}>{Stars(r)} ({r.rating}/5)</p>
                    <p className="text-xs text-gray-500 mt-0.5 line-clamp-2">"{r.message}"</p>
                    <p className="text-[10px] text-gray-600 mt-1">{timeSince(r.createdAt||r.date||Date.now())}</p>
                  </div>
                  <button onClick={e=>{e.stopPropagation();onDelete(r._id||r.id);}}
                    className="text-gray-700 hover:text-red-400 text-xs flex-shrink-0 mt-0.5">✕</button>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ── Product Modal ─────────────────────────────────────────────────────────
function ProductModal({ product, onSave, onClose }) {
  const [form, setForm] = useState(product || {
    name:'', category:'Men, Casual', price:'', originalPrice:'',
    imageUrl:'', modelUrl:'', stock:10, badge:'', isTrending:false
  });
  const [saving, setSaving] = useState(false);

  const cats = ['Men, Formal','Men, Casual','Men, Ethnic','Men, Party Wear',
                'Women, Formal','Women, Casual','Women, Ethnic','Women, Party Wear'];

  const handle = async () => {
    if (!form.name || !form.price) return;
    setSaving(true);
    await onSave(form);
    setSaving(false);
  };

  return (
    <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 modal-overlay" style={{background:'rgba(0,0,0,0.75)',backdropFilter:'blur(8px)'}}>
      <div className="w-full max-w-lg glass rounded-3xl gold-border shadow-2xl overflow-hidden animate-fade-up">
        <div className="flex items-center justify-between px-6 py-4 border-b border-white/5">
          <h2 className="font-syne font-bold text-white text-lg">{product ? '✏️ Edit Product' : '➕ Add New Product'}</h2>
          <button onClick={onClose} className="text-gray-500 hover:text-white w-8 h-8 flex items-center justify-center rounded-lg hover:bg-white/10">✕</button>
        </div>

        <div className="p-6 grid grid-cols-2 gap-4 max-h-[70vh] overflow-y-auto">
          <div className="col-span-2">
            <label className="text-xs text-gray-500 uppercase tracking-widest block mb-1.5">Product Name *</label>
            <input value={form.name} onChange={e=>setForm({...form,name:e.target.value})}
              placeholder="e.g. Premium Navy Suit" className="w-full rounded-xl px-4 py-2.5 text-sm font-dm"/>
          </div>
          <div>
            <label className="text-xs text-gray-500 uppercase tracking-widest block mb-1.5">Price (₹) *</label>
            <input type="number" value={form.price} onChange={e=>setForm({...form,price:e.target.value})}
              placeholder="5999" className="w-full rounded-xl px-4 py-2.5 text-sm font-dm"/>
          </div>
          <div>
            <label className="text-xs text-gray-500 uppercase tracking-widest block mb-1.5">Original Price (₹)</label>
            <input type="number" value={form.originalPrice} onChange={e=>setForm({...form,originalPrice:e.target.value})}
              placeholder="8999" className="w-full rounded-xl px-4 py-2.5 text-sm font-dm"/>
          </div>
          <div>
            <label className="text-xs text-gray-500 uppercase tracking-widest block mb-1.5">Category *</label>
            <select value={form.category} onChange={e=>setForm({...form,category:e.target.value})}
              className="w-full rounded-xl px-4 py-2.5 text-sm font-dm">
              {cats.map(c=><option key={c}>{c}</option>)}
            </select>
          </div>
          <div>
            <label className="text-xs text-gray-500 uppercase tracking-widest block mb-1.5">Stock</label>
            <input type="number" value={form.stock} onChange={e=>setForm({...form,stock:e.target.value})}
              placeholder="10" className="w-full rounded-xl px-4 py-2.5 text-sm font-dm"/>
          </div>
          <div className="col-span-2">
            <label className="text-xs text-gray-500 uppercase tracking-widest block mb-1.5">Image URL</label>
            <input value={form.imageUrl} onChange={e=>setForm({...form,imageUrl:e.target.value})}
              placeholder="https://example.com/image.jpg" className="w-full rounded-xl px-4 py-2.5 text-sm font-dm"/>
          </div>
          <div className="col-span-2">
            <label className="text-xs text-gray-500 uppercase tracking-widest block mb-1.5">3D Model URL (.glb)</label>
            <input value={form.modelUrl} onChange={e=>setForm({...form,modelUrl:e.target.value})}
              placeholder="/models/product.glb" className="w-full rounded-xl px-4 py-2.5 text-sm font-dm"/>
          </div>
          <div>
            <label className="text-xs text-gray-500 uppercase tracking-widest block mb-1.5">Badge</label>
            <select value={form.badge} onChange={e=>setForm({...form,badge:e.target.value})}
              className="w-full rounded-xl px-4 py-2.5 text-sm font-dm">
              {['','HOT','NEW','SALE','PREMIUM'].map(b=><option key={b}>{b||'None'}</option>)}
            </select>
          </div>
          <div className="flex items-center gap-3 pt-5">
            <label className="relative inline-flex items-center cursor-pointer">
              <input type="checkbox" checked={form.isTrending} onChange={e=>setForm({...form,isTrending:e.target.checked})} className="sr-only peer"/>
              <div className="w-10 h-5 bg-gray-700 rounded-full peer peer-checked:bg-gold-500 transition-colors after:content-[''] after:absolute after:top-0.5 after:left-0.5 after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:after:translate-x-5"/>
            </label>
            <span className="text-sm text-gray-400 font-dm">Trending</span>
          </div>
        </div>

        <div className="px-6 py-4 border-t border-white/5 flex gap-3">
          <button onClick={onClose} className="flex-1 py-2.5 rounded-xl text-sm font-dm text-gray-400 border border-white/10 hover:bg-white/5 transition-colors">Cancel</button>
          <button onClick={handle} disabled={saving}
            className="flex-1 py-2.5 rounded-xl text-sm font-syne font-bold bg-gradient-to-r from-gold-500 to-gold-400 text-slate-900 hover:shadow-lg hover:shadow-gold-500/20 transition-all">
            {saving ? '⌛ Saving...' : product ? '✓ Save Changes' : '+ Add Product'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Review Submit (User-facing) ────────────────────────────────────────────
function ReviewForm({ products, onSubmit }) {
  const [form, setForm] = useState({ userName:'', userEmail:'', productId:'', rating:5, message:'' });
  const [sent, setSent] = useState(false);
  const [loading, setLoading] = useState(false);

  const handle = async () => {
    if (!form.userName || !form.message || !form.productId) return;
    setLoading(true);
    const prod = products.find(p=>p._id===form.productId||p.id===form.productId);
    const payload = { ...form, productName: prod?.name||'' };
    await onSubmit(payload);
    setSent(true);
    setLoading(false);
  };

  if (sent) return (
    <div className="text-center py-8 animate-fade-up">
      <div className="text-4xl mb-3">🎉</div>
      <h3 className="font-syne font-bold text-white text-lg">Thank you!</h3>
      <p className="text-gray-500 text-sm mt-1 font-dm">Your review has been submitted.</p>
      <button onClick={()=>setSent(false)} className="mt-4 text-gold-500 text-sm hover:underline">Submit another</button>
    </div>
  );

  return (
    <div className="animate-fade-up">
      <h3 className="font-syne font-bold text-white mb-4">Leave a Review</h3>
      <div className="space-y-3">
        <input value={form.userName} onChange={e=>setForm({...form,userName:e.target.value})}
          placeholder="Your Name *" className="w-full rounded-xl px-4 py-2.5 text-sm font-dm"/>
        <input value={form.userEmail} onChange={e=>setForm({...form,userEmail:e.target.value})}
          placeholder="Email (optional)" className="w-full rounded-xl px-4 py-2.5 text-sm font-dm"/>
        <select value={form.productId} onChange={e=>setForm({...form,productId:e.target.value})}
          className="w-full rounded-xl px-4 py-2.5 text-sm font-dm">
          <option value="">Select Product *</option>
          {products.map(p=><option key={p._id||p.id} value={p._id||p.id}>{p.name}</option>)}
        </select>
        <div className="flex gap-2 items-center">
          <span className="text-xs text-gray-500 uppercase tracking-widest font-dm">Rating:</span>
          {[1,2,3,4,5].map(n=>(
            <button key={n} onClick={()=>setForm({...form,rating:n})}
              className={`text-xl transition-all ${n<=form.rating?'text-yellow-400':'text-gray-700'} hover:scale-110`}>★</button>
          ))}
          <span className="text-xs text-gray-500 ml-1">({form.rating}/5)</span>
        </div>
        <textarea value={form.message} onChange={e=>setForm({...form,message:e.target.value})}
          rows={3} placeholder="Write your review… *"
          className="w-full rounded-xl px-4 py-2.5 text-sm font-dm resize-none"/>
        <button onClick={handle} disabled={loading}
          className="w-full py-2.5 rounded-xl text-sm font-syne font-bold bg-gradient-to-r from-gold-500 to-gold-400 text-slate-900 hover:shadow-lg transition-all">
          {loading ? '⌛ Submitting…' : '→ Submit Review'}
        </button>
      </div>
    </div>
  );
}

// ── Confirm Dialog ────────────────────────────────────────────────────────
function Confirm({ msg, onYes, onNo }) {
  return (
    <div className="fixed inset-0 z-[150] flex items-center justify-center modal-overlay" style={{background:'rgba(0,0,0,0.7)',backdropFilter:'blur(4px)'}}>
      <div className="glass rounded-2xl gold-border p-6 w-80 shadow-2xl animate-fade-up">
        <p className="text-white font-dm mb-5 text-center">{msg}</p>
        <div className="flex gap-3">
          <button onClick={onNo} className="flex-1 py-2 rounded-xl text-sm text-gray-400 border border-white/10 hover:bg-white/5">Cancel</button>
          <button onClick={onYes} className="flex-1 py-2 rounded-xl text-sm font-semibold bg-red-500/20 text-red-400 border border-red-500/30 hover:bg-red-500/30">Delete</button>
        </div>
      </div>
    </div>
  );
}

// ── Main Dashboard ────────────────────────────────────────────────────────
function Dashboard({ admin, onLogout }) {
  const [products, setProducts]   = useState([]);
  const [reviews,  setReviews]    = useState([]);
  const [stats,    setStats]      = useState({});
  const [search,   setSearch]     = useState('');
  const [catFilter,setCatFilter]  = useState('All');
  const [page,     setPage]       = useState('products');
  const [modal,    setModal]      = useState(null);  // null | 'add' | product
  const [confirm,  setConfirm]    = useState(null);
  const [toasts,   setToasts]     = useState([]);
  const [sideOpen, setSideOpen]   = useState(true);
  const [editInline, setEditInline] = useState(null); // { id, field, val }

  const token = localStorage.getItem('adminToken') || 'demo';
  const headers = { 'Content-Type':'application/json', 'Authorization':`Bearer ${token}` };

  const toast = (msg, type='success') => {
    const id = Date.now();
    setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)), 3500);
  };

  // ── Data loading ──────────────────────────────────────────────────────
  const loadProducts = useCallback(async () => {
    try {
      const q = new URLSearchParams({ search, category: catFilter==='All'?'':catFilter });
      const r = await fetch(`${API}/products?${q}`);
      const d = await r.json();
      setProducts(Array.isArray(d) ? d : []);
    } catch {
      // Use seeded demo data offline
      setProducts(getDemoProducts());
    }
  }, [search, catFilter]);

  const loadReviews = useCallback(async () => {
    try {
      const r = await fetch(`${API}/reviews`, { headers });
      setReviews(await r.json());
    } catch {
      setReviews(getDemoReviews());
    }
  }, []);

  const loadStats = useCallback(async () => {
    try {
      const r = await fetch(`${API}/stats`, { headers });
      setStats(await r.json());
    } catch {
      setStats({ totalProducts:22, totalUsers:5, todayVisitors:3, unreadReviews:3, lowStock:4, topProducts:[] });
    }
  }, []);

  useEffect(() => { loadProducts(); }, [loadProducts]);
  useEffect(() => { loadReviews(); loadStats(); }, []);

  // Sales chart mock data
  const salesData = [
    {l:'Mon',v:14},{l:'Tue',v:22},{l:'Wed',v:18},{l:'Thu',v:31},{l:'Fri',v:27},{l:'Sat',v:43},{l:'Sun',v:38}
  ];

  // ── CRUD ──────────────────────────────────────────────────────────────
  const saveProduct = async (form) => {
    try {
      if (form._id) {
        const r = await fetch(`${API}/products/${form._id}`, { method:'PUT', headers, body:JSON.stringify(form) });
        const d = await r.json();
        setProducts(p=>p.map(x=>x._id===form._id?d:x));
        toast('Product updated successfully');
      } else {
        const r = await fetch(`${API}/products`, { method:'POST', headers, body:JSON.stringify(form) });
        const d = await r.json();
        setProducts(p=>[d,...p]);
        toast('Product added successfully');
      }
    } catch {
      // Offline demo
      if (form._id) {
        setProducts(p=>p.map(x=>x._id===form._id?{...x,...form}:x));
      } else {
        setProducts(p=>[{...form,_id:Date.now().toString(),id:Date.now()},...p]);
      }
      toast(form._id?'Product updated':'Product added');
    }
    setModal(null);
  };

  const deleteProduct = async (id) => {
    try { await fetch(`${API}/products/${id}`, { method:'DELETE', headers }); } catch {}
    setProducts(p=>p.filter(x=>x._id!==id));
    toast('Product deleted','error');
    setConfirm(null);
  };

  const saveInlineEdit = async (id, field, val) => {
    try {
      await fetch(`${API}/products/${id}`, { method:'PUT', headers, body:JSON.stringify({[field]:val}) });
    } catch {}
    setProducts(p=>p.map(x=>x._id===id?{...x,[field]:val}:x));
    setEditInline(null);
    toast('Updated');
  };

  // ── Reviews ───────────────────────────────────────────────────────────
  const markRead = async (id) => {
    try { await fetch(`${API}/reviews/${id}/read`, { method:'PATCH', headers }); } catch {}
    setReviews(r=>r.map(x=>(x._id||x.id)===id?{...x,read:true}:x));
  };

  const deleteReview = async (id) => {
    try { await fetch(`${API}/reviews/${id}`, { method:'DELETE', headers }); } catch {}
    setReviews(r=>r.filter(x=>(x._id||x.id)!==id));
    toast('Review removed','error');
  };

  const submitReview = async (payload) => {
    try {
      const r = await fetch(`${API}/reviews`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
      const d = await r.json();
      setReviews(rv=>[d,...rv]);
    } catch {
      setReviews(rv=>[{...payload,_id:Date.now().toString(),id:Date.now(),read:false,createdAt:new Date().toISOString()},...rv]);
    }
    toast('Review submitted! Admin will review it.','success');
    loadStats();
  };

  const cats = ['All','Men, Formal','Men, Casual','Men, Ethnic','Men, Party Wear','Women, Formal','Women, Casual','Women, Ethnic','Women, Party Wear'];

  // Low stock products
  const lowStockProds = products.filter(p=>p.stock < 5);
  const unread = reviews.filter(r=>!r.read).length;

  const navItems = [
    {id:'dashboard', icon:'📊', label:'Dashboard'},
    {id:'products',  icon:'👗', label:'Products'},
    {id:'reviews',   icon:'⭐', label:'Reviews & Feedback'},
    {id:'users',     icon:'👥', label:'Users'},
    {id:'submit',    icon:'📝', label:'Submit Review'},
    {id:'settings',  icon:'⚙️',  label:'Settings'},
  ];

  return (
    <div className="flex h-screen overflow-hidden bg-slate-950">
      <Toast toasts={toasts}/>
      {confirm && <Confirm msg={confirm.msg} onYes={()=>deleteProduct(confirm.id)} onNo={()=>setConfirm(null)}/>}
      {modal && <ProductModal product={modal==='add'?null:modal} onSave={saveProduct} onClose={()=>setModal(null)}/>}

      {/* ── SIDEBAR ──────────────────────────────────────────────────── */}
      <aside className={`${sideOpen?'w-60':'w-16'} flex-shrink-0 h-full glass border-r border-white/5 flex flex-col transition-all duration-300`}>
        {/* Logo */}
        <div className="flex items-center gap-3 px-4 py-5 border-b border-white/5">
          <div className="w-8 h-8 rounded-xl bg-gold-500/20 border border-gold-500/30 flex items-center justify-center flex-shrink-0">
            <span className="text-sm">👑</span>
          </div>
          {sideOpen && <div>
            <p className="font-syne font-bold text-white text-sm">Webion</p>
            <p className="text-[10px] text-gold-500/70 tracking-wider uppercase font-dm">AR Admin</p>
          </div>}
        </div>

        {/* Nav */}
        <nav className="flex-1 py-4 overflow-y-auto">
          {navItems.map(item=>(
            <button key={item.id} onClick={()=>setPage(item.id)}
              className={`sidebar-item w-full flex items-center gap-3 px-4 py-3 text-sm font-dm text-gray-400 ${page===item.id?'active':''}`}>
              <span className="text-base flex-shrink-0">{item.icon}</span>
              {sideOpen && <span className="truncate">{item.label}</span>}
              {sideOpen && item.id==='reviews' && unread>0 && (
                <span className="ml-auto bg-red-500 text-white text-[10px] font-bold rounded-full w-5 h-5 flex items-center justify-center">{unread}</span>
              )}
            </button>
          ))}
        </nav>

        {/* Collapse toggle */}
        <button onClick={()=>setSideOpen(v=>!v)}
          className="border-t border-white/5 p-4 text-gray-600 hover:text-gray-400 text-xs flex items-center gap-2 font-dm">
          <span>{sideOpen?'◀':'▶'}</span>
          {sideOpen && 'Collapse'}
        </button>
      </aside>

      {/* ── MAIN AREA ─────────────────────────────────────────────────── */}
      <main className="flex-1 flex flex-col min-w-0 overflow-hidden">
        {/* Topbar */}
        <header className="flex items-center justify-between px-6 py-4 border-b border-white/5 glass flex-shrink-0">
          <div>
            <h1 className="font-syne font-bold text-white text-xl capitalize">
              {navItems.find(n=>n.id===page)?.label||'Dashboard'}
            </h1>
            <p className="text-xs text-gray-600 font-dm">Webion AR Store — Admin Panel</p>
          </div>
          <div className="flex items-center gap-3">
            <NotifBell reviews={reviews} onRead={markRead} onDelete={deleteReview} token={token}/>
            {lowStockProds.length > 0 && (
              <button onClick={()=>{setPage('products');setCatFilter('All');setSearch('low');}}
                className="flex items-center gap-2 px-3 py-2 rounded-xl bg-red-900/20 border border-red-500/20 text-red-400 text-xs font-medium animate-pulse">
                ⚠ {lowStockProds.length} Low Stock
              </button>
            )}
            <div className="flex items-center gap-2 px-3 py-2 rounded-xl bg-white/5 border border-white/8">
              <div className="w-7 h-7 rounded-full bg-gradient-to-br from-gold-500/40 to-purple-500/40 flex items-center justify-center text-xs font-bold text-white">
                {(admin.name||'A')[0]}
              </div>
              <span className="text-sm font-dm text-gray-400 hidden sm:block">{admin.name}</span>
            </div>
            <button onClick={onLogout}
              className="px-3 py-2 rounded-xl text-xs text-gray-500 border border-white/8 hover:bg-red-900/20 hover:text-red-400 hover:border-red-500/20 transition-all font-dm">
              Logout
            </button>
          </div>
        </header>

        {/* Content */}
        <div className="flex-1 overflow-y-auto p-6">

          {/* ──────── DASHBOARD PAGE ──────── */}
          {page === 'dashboard' && (
            <div className="space-y-6">
              {/* Stat Cards */}
              <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
                <StatCard icon="👗" label="Total Products" value={stats.totalProducts||products.length} sub="Active catalogue" color="bg-gold-500" trend={5}/>
                <StatCard icon="👥" label="Total Users"    value={stats.totalUsers||5}    sub="Registered customers" color="bg-blue-500" trend={12}/>
                <StatCard icon="📈" label="Today Visitors" value={stats.todayVisitors||3} sub="Unique sessions today" color="bg-green-500" trend={-3}/>
                <StatCard icon="⭐" label="New Reviews"    value={stats.unreadReviews||unread} sub="Awaiting response" color="bg-purple-500"/>
              </div>

              {/* Charts row */}
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
                <div className="lg:col-span-2">
                  <MiniChart data={salesData} label="Weekly Sales Volume"/>
                </div>
                <div className="stat-card rounded-2xl p-5 gold-border">
                  <p className="text-xs text-gray-500 tracking-widest uppercase mb-4 font-dm">Stock Alerts</p>
                  <div className="space-y-2 max-h-48 overflow-y-auto">
                    {products.filter(p=>p.stock<5).length===0 ? (
                      <p className="text-sm text-green-400 font-dm">✓ All products well stocked</p>
                    ) : products.filter(p=>p.stock<5).map(p=>(
                      <div key={p._id||p.id} className="flex items-center justify-between py-1.5 border-b border-white/4">
                        <span className="text-xs text-gray-400 font-dm truncate">{p.name}</span>
                        <span className={`text-xs font-bold px-2 py-0.5 rounded ${p.stock===0?'bg-red-900/60 text-red-300':'bg-orange-900/40 text-orange-300'}`}>
                          {p.stock===0?'OUT':''+p.stock}
                        </span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>

              {/* Top products */}
              <div className="stat-card rounded-2xl p-5 gold-border">
                <p className="text-xs text-gray-500 tracking-widest uppercase mb-4 font-dm">Top Selling Products</p>
                <div className="space-y-2">
                  {[...products].sort((a,b)=>(b.sales||0)-(a.sales||0)).slice(0,5).map((p,i)=>(
                    <div key={p._id||p.id} className="flex items-center gap-3 py-2 border-b border-white/4">
                      <span className="text-xs font-bold text-gray-600 w-4">#{i+1}</span>
                      <div className="flex-1 min-w-0">
                        <p className="text-sm text-gray-300 font-dm truncate">{p.name}</p>
                        <p className="text-xs text-gray-600">{p.category}</p>
                      </div>
                      <div className="text-right">
                        <p className="text-sm font-bold text-gold-500">{fmt(p.price)}</p>
                        <p className="text-xs text-gray-600">{p.sales||0} sales</p>
                      </div>
                      <div className="w-16 h-1.5 bg-white/5 rounded-full overflow-hidden">
                        <div className="h-full bg-gold-500/60 rounded-full" style={{width:`${Math.min(100,(p.sales||0)/1.2)}%`}}/>
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Recent reviews */}
              <div className="stat-card rounded-2xl p-5 gold-border">
                <div className="flex items-center justify-between mb-4">
                  <p className="text-xs text-gray-500 tracking-widest uppercase font-dm">Recent Reviews</p>
                  <button onClick={()=>setPage('reviews')} className="text-xs text-gold-500 hover:underline font-dm">View all →</button>
                </div>
                <div className="space-y-3">
                  {reviews.slice(0,3).map(r=>(
                    <div key={r._id||r.id} className="flex gap-3 py-2 border-b border-white/4">
                      <div className="w-8 h-8 rounded-full bg-gradient-to-br from-gold-500/30 to-purple-500/30 flex items-center justify-center text-xs font-bold text-white flex-shrink-0">
                        {r.userName?.[0]?.toUpperCase()||'?'}
                      </div>
                      <div className="flex-1">
                        <div className="flex items-center gap-2 flex-wrap">
                          <span className="text-sm font-semibold text-white">{r.userName}</span>
                          <span className="text-xs text-yellow-400">{Stars(r)}</span>
                          <span className="text-xs text-gray-600">· {r.productName}</span>
                          {!r.read && <span className="w-1.5 h-1.5 bg-gold-500 rounded-full"/>}
                        </div>
                        <p className="text-xs text-gray-500 mt-0.5 line-clamp-1">"{r.message}"</p>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* ──────── PRODUCTS PAGE ──────── */}
          {page === 'products' && (
            <div className="space-y-4 animate-fade-up">
              {/* Toolbar */}
              <div className="flex items-center gap-3 flex-wrap">
                <div className="relative flex-1 min-w-48">
                  <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-600 text-sm">🔍</span>
                  <input value={search} onChange={e=>setSearch(e.target.value)}
                    placeholder="Search products…"
                    className="w-full rounded-xl pl-9 pr-4 py-2.5 text-sm font-dm"/>
                </div>
                <select value={catFilter} onChange={e=>setCatFilter(e.target.value)}
                  className="rounded-xl px-4 py-2.5 text-sm font-dm min-w-40">
                  {cats.map(c=><option key={c}>{c}</option>)}
                </select>
                <button onClick={()=>setModal('add')}
                  className="flex items-center gap-2 px-4 py-2.5 rounded-xl text-sm font-syne font-bold bg-gradient-to-r from-gold-500 to-gold-400 text-slate-900 hover:shadow-lg hover:shadow-gold-500/20 transition-all whitespace-nowrap">
                  + Add Product
                </button>
              </div>

              {/* Table */}
              <div className="glass rounded-2xl gold-border overflow-hidden">
                <div className="overflow-x-auto">
                  <table className="w-full text-sm">
                    <thead>
                      <tr className="border-b border-white/5">
                        <th className="text-left px-4 py-3 text-xs text-gray-600 font-dm uppercase tracking-wider">Product</th>
                        <th className="text-left px-4 py-3 text-xs text-gray-600 font-dm uppercase tracking-wider hidden md:table-cell">Category</th>
                        <th className="text-left px-4 py-3 text-xs text-gray-600 font-dm uppercase tracking-wider">Price</th>
                        <th className="text-left px-4 py-3 text-xs text-gray-600 font-dm uppercase tracking-wider hidden sm:table-cell">Stock</th>
                        <th className="text-left px-4 py-3 text-xs text-gray-600 font-dm uppercase tracking-wider hidden lg:table-cell">Badge</th>
                        <th className="text-left px-4 py-3 text-xs text-gray-600 font-dm uppercase tracking-wider hidden lg:table-cell">Rating</th>
                        <th className="text-right px-4 py-3 text-xs text-gray-600 font-dm uppercase tracking-wider">Actions</th>
                      </tr>
                    </thead>
                    <tbody>
                      {products.length===0 ? (
                        <tr><td colSpan={7} className="text-center py-12 text-gray-600 font-dm">No products found</td></tr>
                      ) : products.map(p => {
                        const lowStock = p.stock < 5;
                        return (
                          <tr key={p._id||p.id} className={`row-hover border-b border-white/4 transition-colors ${lowStock?'stock-danger':''}`}>
                            {/* Name */}
                            <td className="px-4 py-3">
                              <div className="flex items-center gap-3">
                                <div className="w-10 h-12 rounded-lg overflow-hidden bg-white/5 flex-shrink-0 flex items-center justify-center">
                                  {p.imageUrl ? (
                                    <img src={p.imageUrl} alt={p.name} className="w-full h-full object-cover" onError={e=>e.target.style.display='none'}/>
                                  ) : <span className="text-xl">👗</span>}
                                </div>
                                <div>
                                  {editInline?.id===(p._id||p.id) && editInline.field==='name' ? (
                                    <input autoFocus value={editInline.val}
                                      onChange={e=>setEditInline({...editInline,val:e.target.value})}
                                      onBlur={()=>saveInlineEdit(p._id||p.id,'name',editInline.val)}
                                      onKeyDown={e=>e.key==='Enter'&&saveInlineEdit(p._id||p.id,'name',editInline.val)}
                                      className="rounded-lg px-2 py-1 text-sm w-40 font-dm"/>
                                  ) : (
                                    <p className="font-medium text-white text-sm cursor-pointer hover:text-gold-400 transition-colors"
                                      onDoubleClick={()=>setEditInline({id:p._id||p.id,field:'name',val:p.name})}>
                                      {p.name}
                                    </p>
                                  )}
                                  {p.isTrending && <span className="text-[10px] text-gold-500/70">🔥 Trending</span>}
                                </div>
                              </div>
                            </td>
                            {/* Category */}
                            <td className="px-4 py-3 hidden md:table-cell">
                              <span className={`text-xs font-medium font-dm ${catColor(p.category)}`}>{p.category}</span>
                            </td>
                            {/* Price */}
                            <td className="px-4 py-3">
                              {editInline?.id===(p._id||p.id) && editInline.field==='price' ? (
                                <input autoFocus type="number" value={editInline.val}
                                  onChange={e=>setEditInline({...editInline,val:e.target.value})}
                                  onBlur={()=>saveInlineEdit(p._id||p.id,'price',Number(editInline.val))}
                                  onKeyDown={e=>e.key==='Enter'&&saveInlineEdit(p._id||p.id,'price',Number(editInline.val))}
                                  className="rounded-lg px-2 py-1 text-sm w-24 font-dm"/>
                              ) : (
                                <span className="text-gold-500 font-bold cursor-pointer hover:text-gold-400"
                                  onDoubleClick={()=>setEditInline({id:p._id||p.id,field:'price',val:p.price})}>
                                  {fmt(p.price)}
                                </span>
                              )}
                            </td>
                            {/* Stock */}
                            <td className="px-4 py-3 hidden sm:table-cell">
                              <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-bold
                                ${p.stock===0?'bg-red-900/60 text-red-300':
                                  p.stock<5?'bg-orange-900/40 text-orange-300':
                                  'bg-green-900/30 text-green-400'}`}>
                                {p.stock===0?'⚠ Out':p.stock<5?`⚠ ${p.stock}`:p.stock}
                              </span>
                            </td>
                            {/* Badge */}
                            <td className="px-4 py-3 hidden lg:table-cell">
                              {p.badge && (
                                <span className={`px-2 py-0.5 rounded text-[10px] font-bold uppercase badge-${p.badge?.toLowerCase()}`}>
                                  {p.badge}
                                </span>
                              )}
                            </td>
                            {/* Rating */}
                            <td className="px-4 py-3 hidden lg:table-cell">
                              <span className="text-xs text-yellow-400">{Stars(p)} <span className="text-gray-600">{p.rating||'—'}</span></span>
                            </td>
                            {/* Actions */}
                            <td className="px-4 py-3">
                              <div className="flex items-center justify-end gap-1.5">
                                <button onClick={()=>setModal(p)}
                                  className="p-1.5 rounded-lg text-gray-500 hover:text-gold-400 hover:bg-gold-500/10 transition-all text-base" title="Edit">✏️</button>
                                <button onClick={()=>setConfirm({id:p._id||p.id,msg:`Delete "${p.name}"? This cannot be undone.`})}
                                  className="p-1.5 rounded-lg text-gray-500 hover:text-red-400 hover:bg-red-500/10 transition-all text-base" title="Delete">🗑</button>
                              </div>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
                <div className="px-4 py-3 border-t border-white/5 flex items-center justify-between">
                  <p className="text-xs text-gray-600 font-dm">{products.length} products · <span className="text-red-400">{lowStockProds.length} low stock</span></p>
                  <p className="text-xs text-gray-700 font-dm">Double-click Name or Price to edit inline</p>
                </div>
              </div>
            </div>
          )}

          {/* ──────── REVIEWS PAGE ──────── */}
          {page === 'reviews' && (
            <div className="space-y-4 animate-fade-up">
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                {/* All reviews */}
                <div className="glass rounded-2xl gold-border overflow-hidden">
                  <div className="px-5 py-4 border-b border-white/5 flex items-center justify-between">
                    <h2 className="font-syne font-bold text-white">Customer Reviews</h2>
                    <span className="text-xs text-gray-600 font-dm">{reviews.length} total · {unread} unread</span>
                  </div>
                  <div className="divide-y divide-white/4 max-h-[60vh] overflow-y-auto">
                    {reviews.length===0 ? (
                      <div className="py-10 text-center text-gray-600 font-dm text-sm">No reviews yet</div>
                    ) : reviews.map(r=>(
                      <div key={r._id||r.id}
                        className={`p-4 review-card hover:bg-white/3 cursor-pointer transition-colors ${!r.read?'bg-gold-500/4':''}`}

                        <div className="flex items-start gap-3">
                          <div className="w-9 h-9 rounded-full bg-gradient-to-br from-gold-500/30 to-blue-500/30 flex items-center justify-center text-sm font-bold text-white flex-shrink-0">
                            {r.userName?.[0]?.toUpperCase()||'?'}
                          </div>
                          <div className="flex-1 min-w-0">
                            <div className="flex items-center gap-2 flex-wrap">
                              <span className="text-sm font-semibold text-white">{r.userName}</span>
                              {!r.read && <span className="text-[10px] bg-gold-500/20 text-gold-400 px-2 py-0.5 rounded-full font-dm">NEW</span>}
                              <span className="text-[10px] text-gray-600 font-dm ml-auto">{timeSince(r.createdAt||Date.now())}</span>
                            </div>
                            <p className="text-xs text-gray-500 mt-0.5 font-dm">📦 {r.productName}</p>
                            <div className="flex gap-1 my-1">
                              {[1,2,3,4,5].map(i=><span key={i} className={`text-sm ${i<=r.rating?'text-yellow-400':'text-gray-700'}`}>★</span>)}
                            </div>
                            <p className="text-xs text-gray-400 font-dm line-clamp-2">"{r.message}"</p>
                          </div>
                          <button onClick={e=>{e.stopPropagation();deleteReview(r._id||r.id);}}
                            className="text-gray-700 hover:text-red-400 text-xs p-1 rounded hover:bg-red-900/20 transition-all flex-shrink-0">✕</button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                {/* Review form + rating breakdown */}
                <div className="space-y-4">
                  <div className="glass rounded-2xl gold-border p-5">
                    <ReviewForm products={products} onSubmit={submitReview}/>
                  </div>
                  <div className="glass rounded-2xl gold-border p-5">
                    <p className="text-xs text-gray-500 uppercase tracking-widest font-dm mb-4">Rating Breakdown</p>
                    {[5,4,3,2,1].map(n=>{
                      const cnt = reviews.filter(r=>r.rating===n).length;
                      const pct = reviews.length ? (cnt/reviews.length)*100 : 0;
                      return (
                        <div key={n} className="flex items-center gap-3 mb-2">
                          <span className="text-xs text-gray-500 w-4 font-dm">{n}★</span>
                          <div className="flex-1 h-2 bg-white/5 rounded-full overflow-hidden">
                            <div className="h-full bg-gold-500/60 rounded-full transition-all duration-1000" style={{width:`${pct}%`}}/>
                          </div>
                          <span className="text-xs text-gray-600 w-6 text-right font-dm">{cnt}</span>
                        </div>
                      );
                    })}
                    {reviews.length > 0 && (
                      <p className="text-center text-2xl font-syne font-bold text-white mt-3">
                        {(reviews.reduce((s,r)=>s+r.rating,0)/reviews.length).toFixed(1)}
                        <span className="text-sm text-gray-600 font-dm"> / 5.0</span>
                      </p>
                    )}
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* ──────── USERS PAGE ──────── */}
          {page === 'users' && (
            <div className="animate-fade-up">

                    </tr>
                  </thead>
                  <tbody>
                    {[
                      {id:1,name:'Priya Sharma',  email:'priya@example.com', lastVisit:'2025-03-21', reviews:2},
                      {id:2,name:'Rahul Verma',   email:'rahul@example.com', lastVisit:'2025-03-21', reviews:1},
                      {id:3,name:'Anita Patel',   email:'anita@example.com', lastVisit:'2025-03-20', reviews:1},
                      {id:4,name:'Karan Singh',   email:'karan@example.com', lastVisit:'2025-03-21', reviews:1},
                      {id:5,name:'Meera Iyer',    email:'meera@example.com', lastVisit:'2025-03-21', reviews:1},
                    ].map(u=>(
                      <tr key={u.id} className="row-hover border-b border-white/4">
                        <td className="px-4 py-3">
                          <div className="flex items-center gap-3">
                            <div className="w-8 h-8 rounded-full bg-gradient-to-br from-gold-500/30 to-blue-500/30 flex items-center justify-center text-xs font-bold text-white">{u.name[0]}</div>
                            <span className="text-sm text-white font-dm">{u.name}</span>
                          </div>
                        </td>
                        <td className="px-4 py-3 text-gray-500 text-xs font-dm">{u.email}</td>
                        <td className="px-4 py-3 text-gray-500 text-xs font-dm">{u.lastVisit}</td>
                        <td className="px-4 py-3">
                          <span className="text-xs text-blue-400 font-dm">{u.reviews} review{u.reviews!==1?'s':''}</span>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {/* ──────── SUBMIT REVIEW (User-facing) ──────── */}
          {page === 'submit' && (
            <div className="max-w-lg mx-auto animate-fade-up">
              <div className="glass rounded-2xl gold-border p-6">
                <div className="flex items-center gap-3 mb-6">
                  <span className="text-2xl">⭐</span>
                  <div>
                    <h2 className="font-syne font-bold text-white text-lg">Customer Review Portal</h2>
                    <p className="text-xs text-gray-500 font-dm">Share your experience with our products</p>
                  </div>
                </div>
                <ReviewForm products={products} onSubmit={submitReview}/>
              </div>
            </div>
          )}

          {/* ──────── SETTINGS ──────── */}
          {page === 'settings' && (
            <div className="max-w-lg animate-fade-up">
              <div className="glass rounded-2xl gold-border p-6 space-y-5">
                <h2 className="font-syne font-bold text-white text-lg">Settings</h2>
                <div>
                  <label className="text-xs text-gray-500 uppercase tracking-widest block mb-1.5 font-dm">Store Name</label>
                  <input defaultValue="Webion AR Store" className="w-full rounded-xl px-4 py-2.5 text-sm font-dm"/>
                </div>
                <div>
                  <label className="text-xs text-gray-500 uppercase tracking-widest block mb-1.5 font-dm">Admin Email</label>
                  <input defaultValue="admin@webion.in" className="w-full rounded-xl px-4 py-2.5 text-sm font-dm"/>
                </div>
                <div>
                  <label className="text-xs text-gray-500 uppercase tracking-widest block mb-1.5 font-dm">Low Stock Threshold</label>
                  <input type="number" defaultValue={5} className="w-full rounded-xl px-4 py-2.5 text-sm font-dm"/>
                </div>
                <div className="flex items-center justify-between py-2 border-t border-white/5">
                  <div>
                    <p className="text-sm text-gray-300 font-dm">Email Notifications</p>
                    <p className="text-xs text-gray-600">Get notified on new reviews</p>
                  </div>
                  <label className="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" defaultChecked className="sr-only peer"/>
                    <div className="w-10 h-5 bg-gray-700 rounded-full peer peer-checked:bg-gold-500 after:content-[''] after:absolute after:top-0.5 after:left-0.5 after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:after:translate-x-5"/>
                  </label>
                </div>
                <button className="w-full py-2.5 rounded-xl text-sm font-syne font-bold bg-gradient-to-r from-gold-500 to-gold-400 text-slate-900 hover:shadow-lg transition-all">
                  Save Settings
                </button>
              </div>
            </div>
          )}

        </div>
      </main>
    </div>
  );
}

// ── App Root ──────────────────────────────────────────────────────────────
function App() {
  const [admin, setAdmin] = useState(() => {
    const t = localStorage.getItem('adminToken');
    const n = localStorage.getItem('adminName');
    return t ? { token:t, name:n||'Admin' } : null;
  });

  const handleLogin = data => {
    localStorage.setItem('adminToken', data.token);
    localStorage.setItem('adminName', data.name||'Admin');
    setAdmin(data);
  };

  const handleLogout = () => {
    localStorage.removeItem('adminToken');
    localStorage.removeItem('adminName');
    setAdmin(null);
  };

  return admin
    ? <Dashboard admin={admin} onLogout={handleLogout}/>
    : <LoginPage onLogin={handleLogin}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
